name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        go-version:
          - "1.18"
          - "1.22"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go-version }}
          cache: true

      - name: Check formatting
        run: |
          test -z "$(gofmt -l client.go types.go client_test.go)"

      - name: Run tests
        run: |
          go test ./...

      - name: Run tests with coverage
        run: |
          go test -coverprofile=coverage.txt ./...
